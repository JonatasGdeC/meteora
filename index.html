<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meteora</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=League+Spartan:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" />
    <link rel="stylesheet" type="text/css" href="//cdn.jsdelivr.net/npm/slick-carousel@1.8.1/slick/slick.css"/>
    <link rel="stylesheet" type="text/css" href="//cdn.jsdelivr.net/npm/slick-carousel@1.8.1/slick/slick-theme.css"/>
    <link rel="shortcut icon" href="./dist/images/Favicon-48x.png">
    <link rel="stylesheet" href="./dist/styles/main.css">
</head>
<body>
    <header class="header">
        <div class="header__icons">
            <img src="./dist/images/Desktop/Logo desktop.png" alt="Logo Meteora">
            <div class="header__icons--with-menu">
                <span id="menu--burguer" class="material-symbols-outlined header__icons__burguer">menu</span>
                <ul id="menu--mobile" class="header__icons__list">
                    <span id="menu--close" class="material-symbols-outlined header__icons__list__close">close</span>
                    <li>
                        <a href="#">Home</a>
                    </li>
                    <li>
                        <a href="#">Nossas lojas</a>
                    </li>
                    <li>
                        <a href="#">Novidades</a>
                    </li>
                    <li>
                        <a href="#">Promoções</a>
                    </li>
                </ul>
            </div>
        </div>
        <div class="header__search">
            <input class="header__search__input" type="search" placeholder="Digite o produto">
            <button class="header__search__button" type="submit">Buscar</button>
        </div>
    </header>

    <section class="banner">
        <div class="banner__desktop">
            <img src="./dist/images/Desktop/Banner carousel 1 _ 1440 (1).png" alt="Banner 1">
            <img src="./dist/images/Desktop/Banner carousel 2 _ 1440 (1).png" alt="Banner 2">
            <img src="./dist/images/Desktop/Banner carousel 3 _ 1440 (1).png" alt="Banner 3">
        </div>

        <div class="banner__tablet">
            <img src="./dist/images/Tablet/Banner carousel 1 _ 768.png" alt="Banner 1">
            <img src="./dist/images/Tablet/Banner carousel 2 _ 768.png" alt="Banner 2">
            <img src="./dist/images/Tablet/Banner carousel 3 _ 768.png" alt="Banner 3">
        </div>

        <div class="banner__mobile">
            <img src="./dist/images/Mobile/Banner carousel 1 _ 375.png" alt="Banner 1">
            <img src="./dist/images/Mobile/Banner carousel 2 _ 375.png" alt="Banner 2">
            <img src="./dist/images/Mobile/Banner carousel 3 _ 375.png" alt="Banner 3">
        </div>
    </section>
    
    <script src="https://code.jquery.com/jquery-3.7.0.min.js"></script>
    <script type="text/javascript" src="//code.jquery.com/jquery-migrate-1.2.1.min.js"></script>
    <script type="text/javascript" src="//cdn.jsdelivr.net/npm/slick-carousel@1.8.1/slick/slick.min.js"></script>
    <script src="https://unpkg.com/aos@next/dist/aos.js"></script>
    <script src="./dist/scripts/main.js"></script>
</body>
</html>
